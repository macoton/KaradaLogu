<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>KaradaLogu</title>
    <style>
        body { font-family: sans-serif; margin: 20px; --zoom:1; transform-origin: top left; transform: scale(var(--zoom)); }
        h1 { font-size: 8em; font-weight: bold; }
        nav button { margin-right: 10px; }
        /* make all buttons and inputs large and easy to tap */
        button { font-size: 2.5em; padding: 12px 18px; }
        input { font-size: 2.2em; padding: 8px 12px; }
        section { display: none; font-size: 4em; }
        section.active { display: block; width: 90vw; max-width: 1000px; }
        table { border-collapse: collapse; width: auto; max-width: 80vw; }
        th, td { border: 1px solid #ccc; padding: 4px 6px; text-align: left; white-space: nowrap; }
        input, p#msg { font-size: inherit; }
        #notesContainer { max-height: 200px; overflow-y: auto; border: 1px solid #ccc; padding: 5px; }
        #notesContainer button { font-size: inherit; margin: 8px; padding: 16px 24px; }
    </style>
</head>
<body>
    <h1>KaradaLogu</h1>

    <nav>
        <button id="btnInput">入力</button>
        <button id="btnOutput">出力</button>
        <button id="btnSummary">まとめ</button>
        <button id="btnSettings">記録を確認</button>
    </nav>

    <section id="section-input">
        <h2>入力</h2>
        <label for="txtValue">テキストを入力:</label>
        <input type="text" id="txtValue" />
        <p id="msg"></p>
        <h3>その他の記録</h3>
        <div id="notesContainer"></div>
    </section>

    <section id="section-output">
        <h2>出力</h2>
        <h3>体温</h3>
        <table id="tblTemp">
            <thead><tr><th>日時</th><th>体温</th></tr></thead>
            <tbody></tbody>
        </table>
        <h3>血圧・脈拍</h3>
        <table id="tblBP">
            <thead><tr><th>日時</th><th>最高血圧</th><th>最低血圧</th><th>脈拍</th></tr></thead>
            <tbody></tbody>
        </table>
        <h3>その他の記録</h3>
        <table id="tblNotes">
            <thead><tr><th>日時</th><th>内容</th></tr></thead>
            <tbody></tbody>
        </table>
    </section>

    <section id="section-settings">
        <h2>記録を確認</h2>
        <button id="btnClear">記録を削除</button>
        <button id="btnExport">JSONで出力</button>
        <button id="btnImport">JSONから読み込み</button>
        <input type="file" id="fileInput" accept="application/json" style="display:none" />
        <button id="btnGDrive">Google Drive認証</button>
        <button id="btnDriveExport" style="display:none">Driveにエクスポート</button>
        <button id="btnDriveImport" style="display:none">Driveから読み込み</button>
    </section>

    <section id="section-summary">
        <h2>まとめ</h2>
        <h3>体温</h3>
        <table id="tblSummaryTemp">
            <thead><tr><th>日時</th><th>体温</th></tr></thead>
            <tbody></tbody>
        </table>
        <h3>血圧・脈拍</h3>
        <table id="tblSummaryBP">
            <thead><tr><th>日時</th><th>最高血圧</th><th>最低血圧</th><th>脈拍</th></tr></thead>
            <tbody></tbody>
        </table>
        <h3>その他の記録内容（内容ごとの出現回数）</h3>
        <table id="tblSummaryNotes">
            <thead><tr><th>日付</th><th>内容</th><th>出現回数</th><th>最新経過</th></tr></thead>
            <tbody></tbody>
        </table>
    </section>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="app.js"></script>
</body>
</html>
